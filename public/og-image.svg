<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#e9f3ff" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#5cc0ff" stop-opacity="0.35" />
      <stop offset="1" stop-color="#5cc0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="sphere" cx="40%" cy="34%" r="72%">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#e2f0ff" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#halo)" />

  <!-- Ballon -->
  <g transform="translate(600 250)">
    <circle r="120" fill="url(#sphere)" stroke="#5cc0ff" stroke-width="5" />
    <g fill="none" stroke="#5cc0ff" stroke-width="5" stroke-linecap="round">
      <path d="M0 -120 C -16 -70, 16 70, 0 120" />
      <path d="M-120 0 C -70 -18, 70 18, 120 0" />
      <path d="M-90 -80 C -40 -30, -40 30, -85 78" />
      <path d="M90 -80 C 40 -30, 40 30, 85 78" />
    </g>
  </g>

  <text x="600" y="470" text-anchor="middle" font-family="Anton, Impact, sans-serif"
    font-size="86" fill="#10202e" letter-spacing="2">EBOK BASKETBALL</text>
  <text x="600" y="530" text-anchor="middle" font-family="Inter, Arial, sans-serif"
    font-size="34" fill="#4a5b6b">La boîte à outils des basketteurs</text>
</svg>
